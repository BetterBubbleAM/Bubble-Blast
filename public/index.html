<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BubbleBlast - Twoja Gra</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu:700" rel="stylesheet">
</head>
<body>
    <div id="overlays">
        <div id="helloDialog">
            <div id="main">
                <center>
                    <h2 class="title">BUBBLE BLAST</h2>
                    <p class="text-muted">Inspiracja Bubbleam - Własny Silnik</p>
                </center>
                <div class="form-group">
                    <input id="nick" class="form-control" placeholder="Twój Nick" maxlength="15">
                    <select id="gamemode" class="form-control mt-2">
                        <option value="ffa">Tryb FFA</option>
                    </select>
                </div>
                <div class="form-group mt-3">
                    <button id="playBtn" class="btn btn-primary w-100">GRAJ</button>
                </div>
                <hr>
                <div id="settings" class="text-start">
                    <label><input type="checkbox" id="showMass"> Pokaż masę</label><br>
                    <label><input type="checkbox" id="darkTheme" checked> Ciemny motyw</label>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="vector2.js"></script>
    <script src="entity.js"></script>
    <script src="client.js"></script>
</body>
</html>
