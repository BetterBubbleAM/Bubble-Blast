<!DOCTYPE html>
<html>
<head>
    <title>Bubble.am Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f2fbff; }
        canvas { display: block; }
        /* Nieoficjalne rozszerzenie Minimap (Pkt 4) - uproszczone UI */
        #minimap { position: absolute; bottom: 20px; right: 20px; width: 150px; height: 150px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px;}
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="minimap"></div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d'); // pkt 6: Canvas API
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const ws = new WebSocket('ws://localhost:8080'); // pkt 2: WebSocket
        
        let gameState = { players: {}, food:[], viruses:[] };
        let mouseX = 0, mouseY = 0;
        let camX = 0, camY = 0, fovScale = 1;

        ws.onmessage = (event) => {
            gameState = JSON.parse(event.data); // Odbieranie pakietów z tickrate 30
        };

        // Sterowanie Myszka
        canvas.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - canvas.width/2) / fovScale + camX;
            mouseY = (e.clientY - canvas.height/2) / fovScale + camY;
            if(ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'move', x: mouseX, y: mouseY }));
            }
        });

        // Zaawansowane Systemy Sterowania (pkt 4)
        let macroInterval;
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'split' })); // Pop-split / Vanishing Eat przygotowanie
            }
            if (e.code === 'KeyW' && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'shoot' }));
            }
            if (e.code === 'KeyE') { // Macro Feed (E)
                if(!macroInterval) macroInterval = setInterval(() => {
                    ws.send(JSON.stringify({ type: 'shoot' }));
                }, 50); // Ekstremalnie szybkie wyrzucanie masy
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyE') { clearInterval(macroInterval); macroInterval = null; }
        });

        function getRadius(mass) { return Math.sqrt(mass) * 10; }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Renderowanie siatki (warstwa wizualna)
            ctx.strokeStyle = "#ddd";
            for(let i=0; i<3000; i+=50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 3000); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(3000, i); ctx.stroke();
            }

            // pkt 2: Pole widzenia (FOV) - Kamera
            // Znajdź moje komórki, aby ustawić kamerę i FOV
            let myPlayer = Object.values(gameState.players)[0]; // dla uproszczenia (1 gracz lub pierwszy do śledzenia)
            if (myPlayer) {
                let totalMass = 0, avgX = 0, avgY = 0;
                myPlayer.cells.forEach(c => { totalMass += c.mass; avgX += c.x; avgY += c.y; });
                avgX /= myPlayer.cells.length; avgY /= myPlayer.cells.length;
                
                // Interpolacja kamery
                camX += (avgX - camX) * 0.1;
                camY += (avgY - camY) * 0.1;
                // Im większa masa, tym bardziej oddalamy kamerę (zoom out)
                let targetFov = Math.max(0.2, 1.5 - Math.log(totalMass) * 0.1); 
                fovScale += (targetFov - fovScale) * 0.1;
            }

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(fovScale, fovScale); // Zastosowanie FOV
            ctx.translate(-camX, -camY);

            // Rysowanie Jedzenia
            ctx.fillStyle = "blue";
            gameState.food.forEach(f => {
                ctx.beginPath(); ctx.arc(f.x, f.y, 5, 0, Math.PI*2); ctx.fill();
            });

            // Pkt 3: Wirusy - jako zielone kolczatki
            ctx.fillStyle = "rgba(0, 255, 0, 0.7)";
            ctx.strokeStyle = "darkgreen";
            gameState.viruses.forEach(v => {
                ctx.beginPath();
                let r = getRadius(v.mass);
                for(let i=0; i<20; i++) { // Rysowanie kolców
                    let angle = i * (Math.PI*2)/20;
                    let modR = i%2===0 ? r : r+5;
                    ctx.lineTo(v.x + Math.cos(angle)*modR, v.y + Math.sin(angle)*modR);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();
            });

            // Pkt 6: Przezroczystość (Opacity) i Renderowanie graczy
            ctx.globalAlpha = 0.8; 
            
            Object.values(gameState.players).forEach(p => {
                p.cells.forEach(cell => {
                    ctx.fillStyle = "red";
                    ctx.strokeStyle = "darkred";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(cell.x, cell.y, getRadius(cell.mass), 0, Math.PI*2);
                    ctx.fill(); ctx.stroke();

                    // Pkt 6: Nazwy z Unicode
                    ctx.fillStyle = "white";
                    ctx.font = "bold 20px Arial";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("☢ " + Math.floor(cell.mass), cell.x, cell.y); 
                });
            });

            ctx.restore();

            // Pkt 2: Interpolacja (klient rysuje tak szybko jak potrafi monitor, zwykle 60-144 FPS, 
            // mimo że serwer przelicza 30 razy na sekundę)
            requestAnimationFrame(draw); 
        }

        draw();
    </script>
</body>
</html>
